<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher and Student Form</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h2>Teacher and Student Form</h2>

<label for="teacherName" class="form-label">Enter your name (Teacher):</label>
<input type="text" id="teacherName" class="form-control" placeholder="Teacher Name">

<br>

<label for="studentName" class="form-label">Enter student name:</label>
<input type="text" id="studentName" class="form-control" placeholder="Student Name">

<br>

<button class="btn btn-primary" onclick="window.alert('submit ini')">Enter</button>


<script>
 if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
</script>

</body>
</html>
