<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher and Student Form</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h2>Teacher Evaluation Form</h2>

<label for="teacherName" class="form-label">Enter Teacher's name:</label>
<input type="text" id="teacherName" class="form-control" placeholder="Teacher Name">

<br>

<label for="studentName" class="form-label">Enter student name:</label>
<input type="text" id="studentName" class="form-control" placeholder="Student Name">

<br>

<label for="studentGrade" class="form-label">Enter student grade:</label>
<input type="text" id="studentGrade" class="form-control" placeholder="Grade (0-100)">

<br>

<button class="btn btn-primary" onclick="
    var grade = Number(document.getElementById('studentGrade').value);
    if (!grade && grade !== 0) { 
        alert('Please enter a valid grade!'); 
    } else if (grade < 50) { 
        alert('lawlaw ini'); 
    } else { 
        alert('pasar ka'); 
    }
">Submit</button>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker
      .register('/service-worker.js')
      .then(() => console.log('ayos! rehistro as service worker'))
      .catch((error) => console.log('Registration failed: ', error));
}
</script>

</body>
</html>
